server {
    listen 80;
    server_name dajuan.english.lan;
    
    client_max_body_size 1m;
    large_client_header_buffers 4 16k;

    upstream auth_server {
        server 127.0.0.1:3001;
        # you can add more
        # server 127.0.0.1:8001;
    }

    # **************************
    # ! backend/api part.
    # **************************

    # * for auth check (docgate kernel api)
    location = /_docgate/auth_check {
        internal;
        proxy_pass http://auth_server/_docgate/auth_check;

        proxy_set_header Host $host;
        proxy_set_header X-Original-URI $request_uri;
        proxy_set_header Cookie $http_cookie;

        proxy_connect_timeout 5s;
        proxy_send_timeout    5s;
        proxy_read_timeout    5s;

        proxy_buffering off;
    }


    # * supertokens api proxy
    location ^~ /st-auth-api/ {
        proxy_pass http://auth_server;
        proxy_set_header Host $host;
        proxy_set_header Cookie $http_cookie;
    
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_redirect off;
        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
    }

    # ******************************
    # Frontend part.
    # ******************************

    # ---- React part (they share the common /app/ prefix, to make the routing easier)
    # - including 1. /st-auth/ 2. /manage 3. /purchase, ...
    location ^~ /app/ {
        alias /Users/fseasy/workspace/dev-repo/docgate/frontend/dist/;
        try_files $uri $uri/ /index.html; # all page routers are at index.html. $uri is for static resources.
    }
    # ---- End of React Part
    
    # ---- Hugo part
    # * The lowest priority router, targeting Hugo site => website's index will locate at hugo part. 
    location / {
        root /Users/fseasy/workspace/dev-repo/dajuan-english/dist/;
        try_files /index.html;
    }

    # * `/docs/` is the VIP resource under auth protection.
    # ! use `^~ (longest matching prefix)` for higher priority 
    # * `^~` means longest-prefix-matching, the higher order matching rule!
    location ^~ /docs/ {
        auth_request /_docgate/auth_check;
        auth_request_set $auth_status $upstream_status;

        error_page 401 = @login_redirect;
        error_page 403 = @purchase_redirect;

        root /Users/fseasy/workspace/dev-repo/dajuan-english/dist/;
        try_files $uri $uri/ /docs/index.html;

        # avoid cache for index.html (because customer will access by /docs/page/), so rule is on this level.
        add_header Cache-Control "no-store, no-cache, must-revalidate, private";
        add_header Pragma "no-cache";
        add_header Expires 0;
    }
    
    # * add cache for none html resources under /docs/
    location ~* ^/docs/.*\.(m4a|mp3|wav|pdf|jpg|jpeg|png|gif|css|js|woff|woff2|ttf|eot|svg|otf)$ {
        auth_request /_docgate/auth_check;

        root /Users/fseasy/workspace/dev-repo/dajuan-english/dist/;

        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header Expires "Thu, 31 Dec 2097 23:55:55 GMT";

        try_files $uri =404;
        add_header Cache-Control "private, max-age=86400";
    }

    # ---- End of hugo part.

    # ---- Auth error redirect

    # * go to the hugo /50x.html (based on `location /` routing)
    error_page 500 502 503 504 /50x.html;

    # * the `/app/st-auth/` is the root for supertokens' auth. 
    location @login_redirect {
        return 302 /app/st-auth/; 
    }

    location @purchase_redirect {
        return 302 /app/purchase/;
    }
    
}
